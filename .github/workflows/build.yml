# Build portable single-file binaries for Linux, macOS, and Windows.
#
# Triggered by:
#   - Pushing a version tag (v*) — binaries are attached to the GitHub Release.
#   - Manual dispatch from the Actions tab (workflow_dispatch).
#
# Outputs:
#   pdp8calc-linux          — ELF binary, tested on ubuntu-latest (glibc ≥ 2.35)
#   pdp8calc-macos-arm      — Mach-O arm64 binary, tested on macos-latest (Apple Silicon)
#   pdp8calc-macos-intel    — Mach-O x86_64 binary, tested on macos-13 (Intel)
#   pdp8calc-windows.exe    — PE32+ binary, tested on windows-latest
#
# The full test suite (247 tests) must pass before any binary is built.
# Tests run once on Linux; the build matrix is gated on that result.
# This avoids burning macOS/Windows minutes if tests are failing.

name: Build Portable Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the workflow to create and update GitHub Releases.
permissions:
  contents: write

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

  build:
    name: Build (${{ matrix.os }})
    needs: test          # ← all three builds wait for the test job to pass
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pdp8calc-linux
            ext: ""
          - os: macos-latest
            artifact: pdp8calc-macos-arm
            ext: ""
          - os: macos-13
            artifact: pdp8calc-macos-intel
            ext: ""
          - os: windows-latest
            artifact: pdp8calc-windows
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      # windows-curses provides the _curses extension that the stdlib lacks on
      # Windows; PyInstaller bundles it automatically once it is installed.
      - name: Install windows-curses (Windows only)
        if: runner.os == 'Windows'
        run: pip install windows-curses

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name ${{ matrix.artifact }}
          --clean
          pdp8_tui.py

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

      # Attach to the GitHub Release when triggered by a tag push.
      - name: Attach binary to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.artifact }}${{ matrix.ext }}
